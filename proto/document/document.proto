syntax = "proto3";

package document;

import "google/protobuf/empty.proto";

option go_package = "document-metadata/gen/document";

message Document {
  string id = 1;
  string name = 2;
  string description = 3;
  string created_at = 4;
}

message DocumentList {
  repeated Document documents = 1;
}

message CreateRequest {
  string name = 1;
  string description = 2;
}

message IDRequest {
  string id = 1;
}

service DocumentService {
  rpc Create(CreateRequest) returns (Document);
  rpc List(google.protobuf.Empty) returns (DocumentList);
  rpc Get(IDRequest) returns (Document);
  rpc Delete(IDRequest) returns (google.protobuf.Empty);
}
