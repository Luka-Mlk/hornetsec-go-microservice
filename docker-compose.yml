services:
  document-metadata:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hornetsec-document-service
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - HTTP_PORT=8080
      - GRPC_PORT=50051
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/documents"]
      interval: 30s
      timeout: 10s
      retries: 3
